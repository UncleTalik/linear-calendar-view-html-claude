<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Weekly View</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f4; color: #1a1a1a; font-size: 14px;
  -webkit-text-size-adjust: 100%;
}

.app { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
h1 { font-size: 17px; font-weight: 600; margin-bottom: 18px; color: #111; }

.setup { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.setup-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; -webkit-user-select: none; user-select: none; }
.setup-header.open { margin-bottom: 12px; }
.setup-toggle { font-size: 10px; color: #999; margin-right: 6px; transition: transform 0.15s; display: inline-block; }
.setup-header.open .setup-toggle { transform: rotate(90deg); }
.setup-body { display: none; }
.setup-body.open { display: block; }
.setup-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
.ws-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.ws-label { font-size: 13px; color: #555; width: 100px; flex-shrink: 0; }
input[type=password] {
  flex: 1; min-width: 160px; padding: 8px 11px;
  border: 1px solid #ddd; border-radius: 8px;
  font-size: 13px; background: #fafaf9; color: #111; outline: none;
}
input:focus { border-color: #888; background: #fff; }
.ws-badge { display: none; align-items: center; gap: 6px; font-size: 12px; color: #666; margin: 2px 0 10px 108px; }
.ws-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

button {
  padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px;
  background: #fff; font-size: 13px; cursor: pointer; color: #111;
  white-space: nowrap; transition: background 0.1s; -webkit-tap-highlight-color: transparent;
}
button:hover { background: #f0f0ef; }
button:active { background: #e8e8e7; }
button:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-sm { font-size: 11px; color: #999; border-color: #eee; padding: 4px 10px; }

.controls { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.week-label { font-size: 15px; font-weight: 600; flex: 1; min-width: 140px; }
.status-txt { font-size: 12px; color: #999; }
.err { font-size: 12px; color: #c0392b; min-height: 16px; margin-bottom: 6px; }

/* Desktop: 7-col grid, no overflow */
.grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
  align-items: start;
  width: 100%;
}

.day {
  background: #fff; border: 1px solid #e5e5e3; border-radius: 10px;
  padding: 10px 8px; min-height: 110px; overflow: hidden; min-width: 0;
}
.day.today { border-color: #4F67E4; }
.day-name { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.04em; }
.day-num { font-size: 18px; font-weight: 600; color: #111; margin: 2px 0 7px; line-height: 1; }
.day-num.is-today { color: #4F67E4; }
.day-count {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 5px; border-radius: 10px; margin-left: 4px;
  background: #eee; color: #777; vertical-align: middle; line-height: 1.6;
}
.day-count.alert { background: #fde8e8; color: #c0392b; }
.dash { font-size: 13px; color: #ddd; margin-top: 2px; }

.pill {
  border-radius: 5px; padding: 4px 7px; margin-bottom: 4px;
  font-size: 11px; line-height: 1.45; overflow: hidden; cursor: default; min-width: 0;
}
.pill { cursor: pointer; }
.pill:hover { filter: brightness(0.96); }
.pill-title { display: block; font-weight: 500; word-break: break-word; overflow-wrap: break-word; white-space: normal; }
.pill.done { opacity: 0.5; }
.pill.done .pill-title { text-decoration: line-through; font-weight: 400; }

/* Mobile: single column stacked */
@media (max-width: 639px) {
  .grid { grid-template-columns: 1fr; gap: 8px; }
  .day { min-height: unset; padding: 12px 14px; display: flex; flex-direction: column; }
  .day.empty { opacity: 0.4; }
  .day-header-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .day-name { font-size: 12px; }
  .day-num { font-size: 22px; margin: 0; }
  .pill { font-size: 13px; padding: 6px 10px; margin-bottom: 6px; }
}
@media (min-width: 640px) {
  .day-header-row { display: block; }
  .day.empty { opacity: 1; }
}

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 100; justify-content: center; align-items: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: #fff; border-radius: 14px; max-width: 520px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18); overflow: hidden;
  animation: modalIn 0.15s ease-out;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.modal-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 20px 20px 0; gap: 12px;
}
.modal-id { font-size: 12px; color: #999; font-weight: 500; }
.modal-title { font-size: 16px; font-weight: 600; color: #111; padding: 6px 20px 0; line-height: 1.4; }
.modal-desc {
  font-size: 13px; color: #555; line-height: 1.6; padding: 12px 20px;
  max-height: 200px; overflow-y: auto; word-break: break-word;
}
.modal-desc p { margin: 0 0 8px; }
.modal-desc p:last-child { margin-bottom: 0; }
.modal-desc strong { font-weight: 600; color: #333; }
.modal-desc em { font-style: italic; }
.modal-desc s, .modal-desc del { text-decoration: line-through; }
.modal-desc code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; background: #f3f3f3; border-radius: 3px; padding: 1px 4px; }
.modal-desc pre { background: #f3f3f3; border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 0 0 8px; }
.modal-desc pre code { background: none; padding: 0; font-size: 12px; }
.modal-desc ul, .modal-desc ol { padding-left: 20px; margin: 0 0 8px; }
.modal-desc li { margin-bottom: 2px; }
.modal-desc h1, .modal-desc h2, .modal-desc h3 { font-weight: 600; color: #222; margin: 0 0 6px; }
.modal-desc h1 { font-size: 15px; }
.modal-desc h2 { font-size: 14px; }
.modal-desc h3 { font-size: 13px; }
.modal-desc blockquote { border-left: 3px solid #ddd; margin: 0 0 8px; padding: 2px 10px; color: #777; }
.modal-desc a { color: #4F67E4; text-decoration: none; }
.modal-desc a:hover { text-decoration: underline; }
.modal-meta { padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 8px; }
.modal-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.modal-label { color: #999; width: 80px; flex-shrink: 0; }
.modal-value { color: #333; }
.modal-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.modal-close {
  background: none; border: none; font-size: 18px; color: #999; cursor: pointer;
  padding: 0; line-height: 1; flex-shrink: 0;
}
.modal-close:hover { color: #333; }
.modal-divider { height: 1px; background: #eee; margin: 0 20px; }
.modal-link {
  display: inline-block; font-size: 12px; color: #4F67E4; text-decoration: none;
  margin: 0 20px 16px; padding: 6px 12px; border: 1px solid #4F67E4; border-radius: 6px;
}
.modal-link:hover { background: rgba(79,103,228,0.06); }

.ws-separator { height: 1px; background: #e8e8e6; margin: 5px 0; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #eee; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
.leg-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Due date edit */
.due-date-btn { cursor: pointer; border-radius: 4px; padding: 1px 5px; margin: -1px -5px; transition: background 0.1s; display: inline-flex; align-items: center; gap: 4px; }
.due-date-btn:hover { background: #f0f0ef; }
.edit-pencil { font-size: 11px; color: #bbb; }

/* Date picker popup */
.dp-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; justify-content: center; align-items: center; padding: 16px;
}
.dp-overlay.open { display: flex; }
.dp-card {
  background: #fff; border-radius: 12px; padding: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.22); width: 252px;
  animation: modalIn 0.15s ease-out;
}
.dp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.dp-month-label { font-size: 13px; font-weight: 600; color: #111; }
.dp-nav { background: none; border: none; font-size: 18px; cursor: pointer; color: #555; padding: 2px 8px; border-radius: 6px; line-height: 1; }
.dp-nav:hover { background: #f0f0ef; }
.dp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 2px; }
.dp-weekdays span { font-size: 10px; color: #aaa; font-weight: 600; padding: 2px 0; }
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.dp-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 12px; border-radius: 6px; cursor: pointer; transition: background 0.1s;
}
.dp-cell:hover { background: #f0f0ef; }
.dp-cell.other-month { color: #ddd; cursor: default; pointer-events: none; }
.dp-cell.other-month:hover { background: none; }
.dp-cell.today { background: #EBF0FF; color: #4F67E4; font-weight: 700; }
.dp-cell.original { background: #FFF3E0; color: #b8770d; font-weight: 600; }
.dp-cell.selected { background: #4F67E4 !important; color: #fff !important; font-weight: 600; }
.dp-legend { display: flex; gap: 12px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
.dp-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #777; }
.dp-legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.dp-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
.dp-save { background: #4F67E4 !important; color: #fff !important; border-color: #4F67E4 !important; font-weight: 500; }
.dp-save:hover { background: #3d53c8 !important; }

/* Drag and drop */
.pill.dragging { opacity: 0.3; }
.day.drag-over { border-color: #4F67E4; background: rgba(79,103,228,0.05); opacity: 1; }
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 300;
  opacity: 0.88; transform: rotate(2deg) scale(1.04);
  border-radius: 5px; padding: 4px 7px; font-size: 11px; line-height: 1.45;
  box-shadow: 0 4px 18px rgba(0,0,0,0.22); overflow: hidden; max-width: 180px;
}

/* Status change UI */
.pill-inner { display: flex; align-items: flex-start; gap: 4px; }
.pill-state-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  margin-top: 3px; cursor: pointer; transition: transform 0.1s;
}
.pill-state-dot:hover { transform: scale(1.5); }
.pill-done-btn {
  background: none; border: none; padding: 0 0 0 2px; margin: 0;
  cursor: pointer; font-size: 11px; color: #ccc; flex-shrink: 0;
  line-height: 1.45; opacity: 0; transition: opacity 0.1s, color 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.pill:hover .pill-done-btn { opacity: 1; }
.pill.done .pill-done-btn { opacity: 1; color: #16a34a; }
@media (max-width: 639px) { .pill-done-btn { opacity: 0.45; font-size: 13px; } }
.status-dropdown {
  position: fixed; background: #fff; border: 1px solid #e5e5e3;
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 500; min-width: 170px; padding: 4px 0;
  animation: modalIn 0.1s ease-out;
}
.status-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; cursor: pointer; font-size: 12px; color: #333;
  transition: background 0.08s;
}
.status-dropdown-item:hover { background: #f5f5f4; }
.status-dropdown-item.active { font-weight: 600; }
.status-dropdown-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dropdown-check { margin-left: auto; font-size: 11px; color: #4F67E4; }
.modal-status-btn {
  cursor: pointer; display: inline-flex; align-items: center; gap: 3px;
  border-radius: 4px; padding: 1px 4px; margin: -1px -4px;
  transition: background 0.1s;
}
.modal-status-btn:hover { background: #f0f0ef; }
</style>
</head>
<body>
<div class="app">
  <h1>Linear Weekly View</h1>

  <div class="setup">
    <div class="setup-header" id="setup-header" onclick="toggleSetup()">
      <span class="setup-title"><span class="setup-toggle">▶</span>Workspaces</span>
      <button class="btn-sm" onclick="forgetKeys(); event.stopPropagation();">Forget saved keys</button>
    </div>
    <div class="setup-body" id="setup-body">
    <div class="ws-row">
      <span class="ws-label">Workspace 1</span>
      <input type="password" id="t1" placeholder="lin_api_..." autocomplete="off">
      <button id="btn1" onclick="connect(1)">Connect</button>
    </div>
    <div class="ws-badge" id="ws1-badge">
      <div class="ws-dot" id="ws1-dot"></div>
      <span id="ws1-name"></span>
    </div>
    <div class="ws-row">
      <span class="ws-label">Workspace 2</span>
      <input type="password" id="t2" placeholder="lin_api_... (optional)" autocomplete="off">
      <button id="btn2" onclick="connect(2)">Connect</button>
    </div>
    <div class="ws-badge" id="ws2-badge">
      <div class="ws-dot" id="ws2-dot"></div>
      <span id="ws2-name"></span>
    </div>
    </div>
  </div>

  <div class="err" id="err"></div>

  <div class="controls">
    <button onclick="shiftWeek(-1)">← Prev</button>
    <button onclick="shiftWeek(1)">Next →</button>
    <div class="week-label" id="week-label"></div>
    <button onclick="goToday()" style="color:#888">Today</button>
    <button onclick="fetchAndRender()" style="color:#888">↻ Refresh</button>
    <span class="status-txt" id="status"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="legend" id="legend"></div>
</div>

<div class="dp-overlay" id="dp-overlay" onclick="closeDatePicker(event)">
  <div class="dp-card" onclick="event.stopPropagation()">
    <div class="dp-header">
      <button class="dp-nav" onclick="dpShiftMonth(-1)">&#8249;</button>
      <span class="dp-month-label" id="dp-month-label"></span>
      <button class="dp-nav" onclick="dpShiftMonth(1)">&#8250;</button>
    </div>
    <div class="dp-weekdays">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
    </div>
    <div class="dp-grid" id="dp-grid"></div>
    <div class="dp-legend">
      <div class="dp-legend-item"><div class="dp-legend-swatch" style="background:#EBF0FF"></div>Today</div>
      <div class="dp-legend-item"><div class="dp-legend-swatch" style="background:#FFF3E0"></div>Current due date</div>
    </div>
    <div class="dp-footer">
      <button onclick="closeDatePicker()">Cancel</button>
      <button id="dp-save-btn" class="dp-save" onclick="saveDueDate()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-id" id="modal-id"></span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-divider"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <a class="modal-link" id="modal-link" href="#" target="_blank" rel="noopener">Open in Linear &rarr;</a>
  </div>
</div>

<script>
const WS_COLORS = ['#4F67E4', '#E4944F'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let weekStart = getSunday(new Date());
let allIssues = [];
let workspaces = {};
let currentModalIssue = null;
let dpIssue = null, dpSelectedDate = null, dpYear = 0, dpMonth = 0;
let dragIssue = null;
let statusDropdownEl = null;
let touchIssue = null, touchStartX = 0, touchStartY = 0;
let touchDragging = false, touchGhost = null, touchDragOver = null, touchTimer = null;
const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function getSunday(d) {
  const m = new Date(d);
  m.setDate(d.getDate() - d.getDay());
  m.setHours(0,0,0,0);
  return m;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function isoDate(d) {
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${day}`;
}
function fmtShort(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }

async function linearGQL(token, query) {
  const res = await fetch('https://api.linear.app/graphql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': token },
    body: JSON.stringify({ query })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function connect(n) {
  const token = document.getElementById('t' + n).value.trim();
  if (!token) return;
  const btn = document.getElementById('btn' + n);
  btn.textContent = '…'; btn.disabled = true;
  document.getElementById('err').textContent = '';
  try {
    const [data, sd] = await Promise.all([
      linearGQL(token, `{ viewer { name } organization { name } }`),
      linearGQL(token, `{ workflowStates(first: 250) { nodes { id name type color team { id } } } }`).catch(() => null),
    ]);
    workspaces[n] = { token, orgName: data.organization.name, color: WS_COLORS[n - 1], states: sd?.workflowStates?.nodes || [] };
    localStorage.setItem('linear_token_' + n, token);
    document.getElementById('ws' + n + '-dot').style.background = WS_COLORS[n - 1];
    document.getElementById('ws' + n + '-name').textContent = data.organization.name + ' · ' + data.viewer.name;
    document.getElementById('ws' + n + '-badge').style.display = 'flex';
    btn.textContent = 'Refresh'; btn.disabled = false;
    await fetchAndRender();
  } catch(e) {
    document.getElementById('err').textContent = 'Workspace ' + n + ': ' + e.message;
    btn.textContent = 'Connect'; btn.disabled = false;
  }
}

async function fetchAndRender() {
  const wsList = Object.values(workspaces);
  if (!wsList.length) return;
  document.getElementById('status').textContent = 'Loading…';
  allIssues = [];

  const s = isoDate(addDays(weekStart, -1));
  const e = isoDate(addDays(weekStart, 8));
  const q = `query {
    issues(first: 250, filter: { dueDate: { gte: "${s}", lte: "${e}" } }) {
      nodes {
        id identifier title description dueDate url
        project { id name color }
        state { id name type color }
        team { id }
        assignee { displayName }
      }
    }
  }`;

  for (const [idx, ws] of wsList.entries()) {
    try {
      const data = await linearGQL(ws.token, q);
      data.issues.nodes.forEach(i => { i._wsColor = ws.color; i._wsName = ws.orgName; i._wsIndex = idx; });
      allIssues.push(...data.issues.nodes);
    } catch(e) {
      document.getElementById('err').textContent = ws.orgName + ': ' + e.message;
    }
  }

  document.getElementById('status').textContent =
    allIssues.length + ' issue' + (allIssues.length !== 1 ? 's' : '');
  renderWeek();
}

function hexToRgb(h) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [80,103,228];
}
function pillStyle(hex) {
  const [r,g,b] = hexToRgb(hex || '#4F67E4');
  const lum = 0.299*r + 0.587*g + 0.114*b;
  const bg = `rgba(${r},${g},${b},0.13)`;
  const text = lum > 150
    ? `rgb(${Math.round(r*0.38)},${Math.round(g*0.38)},${Math.round(b*0.38)})`
    : lum < 80
      ? `rgb(${Math.min(255,r+130)},${Math.min(255,g+130)},${Math.min(255,b+130)})`
      : hex;
  return { bg, text };
}

function renderWeek() {
  const grid = document.getElementById('grid');
  const todayStr = isoDate(new Date());
  const isMobile = window.innerWidth < 640;
  grid.innerHTML = '';
  const seenProjects = {};

  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const ds = isoDate(d);
    const isToday = ds === todayStr;
    const dayIssues = allIssues
      .filter(is => is.dueDate && is.dueDate.startsWith(ds))
      .sort((a, b) => {
        if (a._wsIndex !== b._wsIndex) return a._wsIndex - b._wsIndex;
        const aProj = a.project?.name || '';
        const bProj = b.project?.name || '';
        if (aProj !== bProj) return aProj.localeCompare(bProj);
        const aDone = isIssueCompleted(a);
        const bDone = isIssueCompleted(b);
        return aDone - bDone;
      });
    const isEmpty = dayIssues.length === 0;

    const col = document.createElement('div');
    col.className = 'day' + (isToday ? ' today' : '') + (isEmpty && isMobile ? ' empty' : '');
    col.dataset.date = ds;
    col.addEventListener('dragover', e => {
      if (!dragIssue) return;
      e.preventDefault();
      document.querySelectorAll('.day.drag-over').forEach(d => d.classList.remove('drag-over'));
      col.classList.add('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.day.drag-over').forEach(d => d.classList.remove('drag-over'));
      if (dragIssue && (dragIssue.dueDate || '').slice(0, 10) !== ds) {
        applyDueDateChange(dragIssue, ds);
      }
    });

    const hdr = document.createElement('div');
    hdr.className = 'day-header-row';
    const count = dayIssues.length;
    const countBadge = count > 0
      ? `<span class="day-count${count > 10 ? ' alert' : ''}">${count}</span>`
      : '';
    hdr.innerHTML =
      `<div class="day-name">${DAYS[i]}</div>` +
      `<div class="day-num${isToday ? ' is-today' : ''}">${d.getDate()}${countBadge}</div>`;
    col.appendChild(hdr);

    if (isEmpty) {
      col.innerHTML += `<div class="dash">—</div>`;
    } else {
      let lastWsIndex = null;
      dayIssues.forEach(issue => {
        if (lastWsIndex !== null && issue._wsIndex !== lastWsIndex) {
          const sep = document.createElement('div');
          sep.className = 'ws-separator';
          col.appendChild(sep);
        }
        lastWsIndex = issue._wsIndex;
        const color = issue.project?.color || issue._wsColor;
        const { bg, text } = pillStyle(color);
        const pill = document.createElement('div');
        const isDone = isIssueCompleted(issue);
        pill.className = 'pill' + (isDone ? ' done' : '');
        pill.style.background = bg;
        const meta = [issue.project?.name, issue.assignee?.displayName].filter(Boolean).join(' · ');
        pill.title = [issue.identifier, issue.title, meta].filter(Boolean).join(' · ');
        const stateCol = getStateColor(issue);
        const doneTitle = isDone ? 'Undo (→ In Progress)' : 'Mark as done';
        pill.innerHTML = `<div class="pill-inner"><span class="pill-state-dot" style="background:${stateCol}" title="${issue.state?.name || ''}"></span><span class="pill-title" style="color:${text}">${issue.title}</span><button class="pill-done-btn" title="${doneTitle}">✓</button></div>`;
        pill.onclick = () => openModal(issue);
        pill.querySelector('.pill-state-dot').addEventListener('click', e => { e.stopPropagation(); openStatusDropdown(issue, e.currentTarget); });
        pill.querySelector('.pill-done-btn').addEventListener('click', e => { e.stopPropagation(); quickMarkDone(issue); });
        pill._issue = issue;
        if (!hasTouch) {
          pill.draggable = true;
          pill.addEventListener('dragstart', e => {
            dragIssue = issue;
            pill.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', issue.id);
          });
          pill.addEventListener('dragend', () => {
            dragIssue = null;
            pill.classList.remove('dragging');
            document.querySelectorAll('.day.drag-over').forEach(d => d.classList.remove('drag-over'));
          });
        } else {
          pill.addEventListener('touchstart', onPillTouchStart, { passive: true });
          pill.addEventListener('touchmove', onPillTouchMove, { passive: false });
          pill.addEventListener('touchend', onPillTouchEnd);
          pill.addEventListener('touchcancel', onPillTouchEnd);
        }
        col.appendChild(pill);
        if (issue.project) seenProjects[issue.project.id] = issue.project;
      });
    }
    grid.appendChild(col);
  }

  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  Object.values(seenProjects).forEach(p => {
    legend.innerHTML += `<div class="leg-item"><div class="leg-swatch" style="background:${p.color||'#888'}"></div><span>${p.name}</span></div>`;
  });
  Object.values(workspaces).forEach(ws => {
    legend.innerHTML += `<div class="leg-item"><div class="leg-swatch" style="background:${ws.color};border-radius:50%"></div><span>${ws.orgName}</span></div>`;
  });
}

async function applyDueDateChange(issue, newDate) {
  const ws = Object.values(workspaces)[issue._wsIndex];
  if (!ws) { document.getElementById('err').textContent = 'Cannot find workspace token'; return; }
  const oldDate = issue.dueDate;
  // Optimistic update: move pill immediately, revert on failure
  issue.dueDate = newDate;
  renderWeek();
  try {
    const data = await linearGQL(ws.token,
      `mutation { issueUpdate(id: "${issue.id}", input: { dueDate: "${newDate}" }) { success } }`
    );
    if (!data.issueUpdate.success) throw new Error('Update returned success=false');
  } catch(err) {
    issue.dueDate = oldDate;
    renderWeek();
    document.getElementById('err').textContent = 'Failed to update due date: ' + err.message;
  }
}

function stateTypeDefaultColor(type) {
  return { triage:'#95A2B3', backlog:'#95A2B3', unstarted:'#E2E8F0', started:'#F59E0B', completed:'#10B981', cancelled:'#94A3B8' }[type] || '#95A2B3';
}
function isIssueCompleted(issue) {
  return issue.state?.type === 'completed' || issue.state?.type === 'cancelled';
}
function getStateColor(issue) {
  return issue.state?.color || stateTypeDefaultColor(issue.state?.type);
}
function getWorkspace(issue) {
  return Object.values(workspaces)[issue._wsIndex];
}

function getTeamStates(issue) {
  const ws = getWorkspace(issue);
  if (!ws?.states?.length) return [];
  const teamId = issue.team?.id;
  return teamId ? ws.states.filter(s => s.team?.id === teamId) : ws.states;
}

async function applyStatusChange(issue, stateId) {
  const ws = getWorkspace(issue);
  if (!ws) { document.getElementById('err').textContent = 'Cannot find workspace token'; return; }
  const newState = ws.states?.find(s => s.id === stateId);
  if (!newState) return;
  const oldState = issue.state;
  issue.state = newState;
  renderWeek();
  closeStatusDropdown();
  if (currentModalIssue?.id === issue.id) updateModalStatus();
  try {
    const data = await linearGQL(ws.token,
      `mutation { issueUpdate(id: "${issue.id}", input: { stateId: "${stateId}" }) { success } }`
    );
    if (!data.issueUpdate.success) throw new Error('Update returned success=false');
  } catch(err) {
    issue.state = oldState;
    renderWeek();
    if (currentModalIssue?.id === issue.id) updateModalStatus();
    document.getElementById('err').textContent = 'Failed to update status: ' + err.message;
  }
}

function quickMarkDone(issue) {
  const ws = getWorkspace(issue);
  if (!ws?.states?.length) return;
  const isDone = isIssueCompleted(issue);
  const teamStates = getTeamStates(issue);
  const target = isDone
    ? (teamStates.find(s => s.type === 'started') || teamStates.find(s => s.type === 'unstarted'))
    : teamStates.find(s => s.type === 'completed');
  if (target) applyStatusChange(issue, target.id);
}

function openStatusDropdown(issue, anchorEl) {
  closeStatusDropdown();
  const teamStates = getTeamStates(issue);
  if (!teamStates.length) return;
  const dropdown = document.createElement('div');
  dropdown.className = 'status-dropdown';
  statusDropdownEl = dropdown;
  teamStates.forEach(state => {
    const isCurrent = state.id === issue.state?.id;
    const item = document.createElement('div');
    item.className = 'status-dropdown-item' + (isCurrent ? ' active' : '');
    item.innerHTML = `<div class="status-dropdown-item-dot" style="background:${state.color || stateTypeDefaultColor(state.type)}"></div><span>${state.name}</span>${isCurrent ? '<span class="status-dropdown-check">✓</span>' : ''}`;
    item.addEventListener('click', e => { e.stopPropagation(); applyStatusChange(issue, state.id); });
    dropdown.appendChild(item);
  });
  const rect = anchorEl.getBoundingClientRect();
  const dpW = 170;
  const dpH = teamStates.length * 34 + 8;
  let left = rect.left;
  let top = rect.bottom + 4;
  if (left + dpW > window.innerWidth - 8) left = window.innerWidth - dpW - 8;
  if (top + dpH > window.innerHeight - 8) top = rect.top - dpH - 4;
  dropdown.style.left = Math.max(8, left) + 'px';
  dropdown.style.top = Math.max(8, top) + 'px';
  document.body.appendChild(dropdown);
  setTimeout(() => { if (statusDropdownEl) document.addEventListener('click', closeStatusDropdown, { once: true }); }, 0);
}

function closeStatusDropdown() {
  if (statusDropdownEl) { statusDropdownEl.remove(); statusDropdownEl = null; }
}

function onPillTouchStart(e) {
  const pill = e.currentTarget;
  touchIssue = pill._issue;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDragging = false;
  // Long-press (400ms) activates drag mode
  touchTimer = setTimeout(() => {
    touchDragging = true;
    if (navigator.vibrate) navigator.vibrate(50);
    pill.classList.add('dragging');
    touchGhost = document.createElement('div');
    touchGhost.className = 'drag-ghost';
    touchGhost.style.background = pill.style.background;
    touchGhost.style.width = Math.min(pill.offsetWidth, 180) + 'px';
    touchGhost.innerHTML = pill.innerHTML;
    document.body.appendChild(touchGhost);
    touchGhost.style.left = (touchStartX - touchGhost.offsetWidth / 2) + 'px';
    touchGhost.style.top  = (touchStartY - 24) + 'px';
  }, 400);
}

function onPillTouchMove(e) {
  if (!touchIssue) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!touchDragging) {
    // Cancel long-press if finger moves more than 10px (it's a scroll)
    if (Math.sqrt(dx * dx + dy * dy) > 10) {
      clearTimeout(touchTimer); touchTimer = null; touchIssue = null;
    }
    return;
  }
  e.preventDefault(); // stop page scroll while dragging
  const x = e.touches[0].clientX, y = e.touches[0].clientY;
  if (touchGhost) {
    touchGhost.style.left = (x - touchGhost.offsetWidth / 2) + 'px';
    touchGhost.style.top  = (y - 24) + 'px';
  }
  // Find the day column under the finger
  if (touchGhost) touchGhost.style.visibility = 'hidden';
  const target = document.elementFromPoint(x, y);
  if (touchGhost) touchGhost.style.visibility = '';
  const dayEl = target?.closest('.day[data-date]');
  if (dayEl !== touchDragOver) {
    if (touchDragOver) touchDragOver.classList.remove('drag-over');
    touchDragOver = dayEl || null;
    if (touchDragOver) touchDragOver.classList.add('drag-over');
  }
}

function onPillTouchEnd(e) {
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
  const pill = e.currentTarget;
  pill.classList.remove('dragging');
  if (touchDragging) {
    e.preventDefault(); // suppress synthetic click after drag
    if (touchGhost) { touchGhost.remove(); touchGhost = null; }
    if (touchDragOver) {
      touchDragOver.classList.remove('drag-over');
      const targetDate = touchDragOver.dataset.date;
      if (touchIssue && targetDate && targetDate !== (touchIssue.dueDate || '').slice(0, 10)) {
        applyDueDateChange(touchIssue, targetDate);
      }
      touchDragOver = null;
    }
  }
  touchIssue = null;
  touchDragging = false;
}

function updateLabel() {
  document.getElementById('week-label').textContent =
    fmtShort(weekStart) + ' – ' + fmtShort(addDays(weekStart, 6));
}
function shiftWeek(n) { weekStart = addDays(weekStart, n * 7); updateLabel(); fetchAndRender(); }
function goToday() { weekStart = getSunday(new Date()); updateLabel(); fetchAndRender(); }

async function autoConnect() {
  for (const n of [1, 2]) {
    const saved = localStorage.getItem('linear_token_' + n);
    if (saved) { document.getElementById('t' + n).value = saved; await connect(n); }
  }
}

function renderMarkdown(text) {
  // Escape HTML to prevent XSS, then apply markdown patterns
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Split into blocks (code fences, then line groups)
  const blocks = [];
  const lines = text.split('\n');
  let i = 0;
  while (i < lines.length) {
    if (lines[i].startsWith('```')) {
      const lang = lines[i].slice(3).trim();
      i++;
      const code = [];
      while (i < lines.length && !lines[i].startsWith('```')) { code.push(esc(lines[i])); i++; }
      i++;
      blocks.push(`<pre><code>${code.join('\n')}</code></pre>`);
    } else {
      blocks.push(lines[i]);
      i++;
    }
  }
  // Join non-code blocks and apply inline/block markdown
  const html = blocks.join('\n');
  const sections = html.split(/(<pre>[\s\S]*?<\/pre>)/g);
  const processed = sections.map(sec => {
    if (sec.startsWith('<pre>')) return sec;
    // Block-level: headings, blockquotes, lists
    const lineArr = sec.split('\n');
    const out = [];
    let inUl = false, inOl = false;
    const flushList = () => {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (inOl) { out.push('</ol>'); inOl = false; }
    };
    for (const raw of lineArr) {
      const line = raw;
      const h3 = line.match(/^### (.+)/); if (h3) { flushList(); out.push(`<h3>${inline(h3[1])}</h3>`); continue; }
      const h2 = line.match(/^## (.+)/);  if (h2) { flushList(); out.push(`<h2>${inline(h2[1])}</h2>`); continue; }
      const h1 = line.match(/^# (.+)/);   if (h1) { flushList(); out.push(`<h1>${inline(h1[1])}</h1>`); continue; }
      const bq = line.match(/^> (.+)/);   if (bq) { flushList(); out.push(`<blockquote>${inline(bq[1])}</blockquote>`); continue; }
      const ul = line.match(/^[-*] (.+)/);if (ul) { if (!inUl) { flushList(); out.push('<ul>'); inUl = true; } out.push(`<li>${inline(ul[1])}</li>`); continue; }
      const ol = line.match(/^\d+\. (.+)/);if (ol){ if (!inOl) { flushList(); out.push('<ol>'); inOl = true; } out.push(`<li>${inline(ol[1])}</li>`); continue; }
      flushList();
      out.push(line.trim() === '' ? '' : `<p>${inline(line)}</p>`);
    }
    flushList();
    return out.filter((l,idx,arr) => !(l === '' && arr[idx-1] === '')).join('');
  });
  return processed.join('');
  function inline(s) {
    // Escape HTML first
    s = esc(s);
    // inline code (before other patterns)
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Extract all URLs as placeholders BEFORE bold/italic formatting so that
    // underscores or asterisks inside URLs are never treated as markdown.
    // Note: esc() above has already turned < > into &lt; &gt;
    const links = [];
    // markdown links [text](url) or [text](<url>)
    s = s.replace(/\[([^\]]+)\]\((?:&lt;)?(https?:\/\/(?:(?!&gt;)[^)\s])+)(?:&gt;)?\)/g, (_, text, url) => {
      const idx = links.length;
      links.push(`<a href="${url}" target="_blank" rel="noopener">${text}</a>`);
      return `\x00LINK${idx}\x00`;
    });
    // bare URLs — replace with placeholders before formatting
    s = s.replace(/(https?:\/\/[^\s<>"]+)/g, (url) => {
      const idx = links.length;
      links.push(`<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
      return `\x00LINK${idx}\x00`;
    });
    // bold+italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // italic
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
    // strikethrough
    s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
    // restore all links
    s = s.replace(/\x00LINK(\d+)\x00/g, (_, i) => links[+i]);
    return s;
  }
}

function openModal(issue) {
  currentModalIssue = issue;
  document.getElementById('modal-id').textContent = issue.identifier || '';
  document.getElementById('modal-title').textContent = issue.title || '';
  const desc = issue.description || 'No description';
  document.getElementById('modal-desc').innerHTML = renderMarkdown(desc);

  const meta = document.getElementById('modal-meta');
  const stateCol = getStateColor(issue);
  const otherRows = [
    { label: 'Workspace', value: issue._wsName || '—', dot: issue._wsColor },
    { label: 'Project', value: issue.project?.name || '—', dot: issue.project?.color },
    { label: 'Assignee', value: issue.assignee?.displayName || 'Unassigned' },
  ];
  const dueDateFmt = issue.dueDate
    ? new Date(issue.dueDate + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    : '—';
  meta.innerHTML =
    `<div class="modal-row" id="modal-status-row"><span class="modal-label">Status</span><div class="modal-status-dot" id="modal-state-dot" style="background:${stateCol}"></div><span class="modal-value modal-status-btn" id="modal-state-value" title="Click to change status">${issue.state?.name || '—'} <span style="font-size:10px;color:#bbb">▾</span></span></div>` +
    otherRows.map(r => {
      const dot = r.dot ? `<div class="modal-status-dot" style="background:${r.dot}"></div>` : '';
      return `<div class="modal-row"><span class="modal-label">${r.label}</span>${dot}<span class="modal-value">${r.value}</span></div>`;
    }).join('') +
    `<div class="modal-row"><span class="modal-label">Due date</span><span class="modal-value due-date-btn" onclick="openDatePicker()" title="Click to change due date">${dueDateFmt}<span class="edit-pencil">✎</span></span></div>`;
  document.getElementById('modal-state-value').addEventListener('click', e => {
    openStatusDropdown(currentModalIssue, e.currentTarget);
  });

  const link = document.getElementById('modal-link');
  if (issue.url) { link.href = issue.url; link.style.display = ''; }
  else { link.style.display = 'none'; }

  document.getElementById('modal-overlay').classList.add('open');
  document.addEventListener('keydown', modalEsc);
}

function closeModal(e) {
  if (e && e.target && e.target !== document.getElementById('modal-overlay')) return;
  closeStatusDropdown();
  document.getElementById('modal-overlay').classList.remove('open');
  document.removeEventListener('keydown', modalEsc);
}

function modalEsc(e) {
  if (e.key !== 'Escape') return;
  if (statusDropdownEl) { closeStatusDropdown(); return; }
  if (document.getElementById('dp-overlay').classList.contains('open')) {
    closeDatePicker();
  } else {
    closeModal();
  }
}

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function openDatePicker() {
  dpIssue = currentModalIssue;
  dpSelectedDate = dpIssue?.dueDate || null;
  const start = dpSelectedDate ? new Date(dpSelectedDate + 'T00:00:00') : new Date();
  dpYear = start.getFullYear();
  dpMonth = start.getMonth();
  renderDatePicker();
  document.getElementById('dp-overlay').classList.add('open');
}

function renderDatePicker() {
  const todayStr = isoDate(new Date());
  const originalStr = dpIssue?.dueDate || null;
  document.getElementById('dp-month-label').textContent = MONTH_NAMES[dpMonth] + ' ' + dpYear;

  const grid = document.getElementById('dp-grid');
  grid.innerHTML = '';

  const firstDow = new Date(dpYear, dpMonth, 1).getDay();
  const daysInMonth = new Date(dpYear, dpMonth + 1, 0).getDate();
  const daysInPrev = new Date(dpYear, dpMonth, 0).getDate();

  // Leading days from previous month (not clickable)
  for (let i = 0; i < firstDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'dp-cell other-month';
    cell.textContent = daysInPrev - firstDow + 1 + i;
    grid.appendChild(cell);
  }

  // Days of current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = isoDate(new Date(dpYear, dpMonth, d));
    const cell = document.createElement('div');
    const cls = ['dp-cell'];
    if (dateStr === dpSelectedDate) cls.push('selected');
    else if (dateStr === todayStr) cls.push('today');
    else if (originalStr && dateStr === originalStr) cls.push('original');
    cell.className = cls.join(' ');
    cell.textContent = d;
    cell.onclick = () => { dpSelectedDate = dateStr; renderDatePicker(); };
    grid.appendChild(cell);
  }

  // Trailing days from next month (not clickable)
  const trailing = (7 - ((firstDow + daysInMonth) % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const cell = document.createElement('div');
    cell.className = 'dp-cell other-month';
    cell.textContent = i;
    grid.appendChild(cell);
  }

  document.getElementById('dp-save-btn').disabled = !dpSelectedDate;
}

function dpShiftMonth(n) {
  dpMonth += n;
  if (dpMonth < 0) { dpMonth = 11; dpYear--; }
  else if (dpMonth > 11) { dpMonth = 0; dpYear++; }
  renderDatePicker();
}

function closeDatePicker(e) {
  if (e && e.target !== document.getElementById('dp-overlay')) return;
  document.getElementById('dp-overlay').classList.remove('open');
}

async function saveDueDate() {
  if (!dpIssue || !dpSelectedDate) return;
  const saveBtn = document.getElementById('dp-save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';
  const ws = Object.values(workspaces)[dpIssue._wsIndex];
  if (!ws) {
    document.getElementById('err').textContent = 'Cannot find workspace token';
    saveBtn.textContent = 'Save'; saveBtn.disabled = false;
    return;
  }
  try {
    const data = await linearGQL(ws.token,
      `mutation { issueUpdate(id: "${dpIssue.id}", input: { dueDate: "${dpSelectedDate}" }) { success issue { id dueDate } } }`
    );
    if (!data.issueUpdate.success) throw new Error('Update returned success=false');
    // Update local state immediately (no need to re-fetch)
    const idx = allIssues.findIndex(i => i.id === dpIssue.id);
    if (idx !== -1) allIssues[idx].dueDate = dpSelectedDate;
    dpIssue.dueDate = dpSelectedDate;
    document.getElementById('dp-overlay').classList.remove('open');
    renderWeek();
    updateModalDueDate(dpSelectedDate);
  } catch(err) {
    document.getElementById('err').textContent = 'Failed to update due date: ' + err.message;
  } finally {
    saveBtn.textContent = 'Save';
    saveBtn.disabled = !dpSelectedDate;
  }
}

function updateModalStatus() {
  const dot = document.getElementById('modal-state-dot');
  const val = document.getElementById('modal-state-value');
  if (!dot || !val || !currentModalIssue) return;
  const issue = currentModalIssue;
  dot.style.background = getStateColor(issue);
  val.innerHTML = (issue.state?.name || '—') + ' <span style="font-size:10px;color:#bbb">▾</span>';
}

function updateModalDueDate(dateStr) {
  const btn = document.querySelector('#modal-meta .due-date-btn');
  if (!btn) return;
  const fmt = new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  btn.innerHTML = fmt + '<span class="edit-pencil">✎</span>';
}

function toggleSetup() {
  document.getElementById('setup-header').classList.toggle('open');
  document.getElementById('setup-body').classList.toggle('open');
}

function forgetKeys() {
  [1,2].forEach(n => {
    localStorage.removeItem('linear_token_' + n);
    document.getElementById('t' + n).value = '';
    document.getElementById('ws' + n + '-badge').style.display = 'none';
    const btn = document.getElementById('btn' + n);
    btn.textContent = 'Connect'; btn.disabled = false;
  });
  workspaces = {}; allIssues = [];
  document.getElementById('status').textContent = '';
  document.getElementById('legend').innerHTML = '';
  renderWeek();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && statusDropdownEl) closeStatusDropdown(); });

updateLabel();
autoConnect();
</script>
